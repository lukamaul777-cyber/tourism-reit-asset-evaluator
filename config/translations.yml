    flow_validity_text: "\u5C55\u793A\u5185\u5BB9\u6548\u5EA6\u3001\u53EF\u9760\u6027\u4E0E\u7A33\u5065\u6027\u68C0\u67E5\u3002"
    score_ranking: "REITs \u9002\u914D\u6027\u8BC4\u5206\u6392\u540D"
    score_chart_unavailable: "\u7531\u4E8E\u603B\u5206\u6570\u636E\u4E0D\u53EF\u7528\uFF0C\u8BC4\u5206\u56FE\u8868\u6682\u65E0\u6CD5\u5C55\u793A\u3002"
    how_to_read: "\u5982\u4F55\u9605\u8BFB\u672C\u770B\u677F"
    how_to_read_text: "- **\u76D1\u7BA1\u51C6\u5165\u68C0\u67E5** \u7528\u4E8E\u5728\u89E3\u8BFB\u8BC4\u5206\u524D\u68C0\u67E5\u786C\u6027\u6761\u4EF6\u3002\n- **REITs \u9002\u914D\u6027\u8BC4\u5206** \u4F7F\u7528\u6700\u65B0\u5E74\u5EA6\u3001\u6837\u672C\u76F8\u5BF9\u6307\u6807\u6BD4\u8F83\u8D44\u4EA7\u3002\n- **\u98CE\u9669\u9884\u8B66** \u5C55\u793A\u76F8\u5BF9\u9AD8\u98CE\u9669\u7C7B\u522B\uFF0C\u4E0D\u4F7F\u7528\u5B98\u65B9\u9608\u503C\u3002\n- **\u6A21\u578B\u6709\u6548\u6027** \u8BF4\u660E\u53C2\u8003\u6846\u67B6\u8986\u76D6\u3001\u53EF\u9760\u6027\u68C0\u67E5\u548C\u7A33\u5065\u6027\u8BCA\u65AD\u3002\n- \u8BF7\u59CB\u7EC8\u67E5\u770B `data_type` \u548C `source_note`\uFF1B\u6A21\u62DF\u503C\u4EC5\u7528\u4E8E\u4F5C\u54C1\u96C6\u6F14\u793A\u3002"
    current_sidebar_asset: "\u5F53\u524D\u4FA7\u8FB9\u680F\u8D44\u4EA7\u9009\u62E9\uFF1A{asset_id}\u3002\u5404\u9875\u9762\u89C6\u56FE\u4F7F\u7528\u72EC\u7ACB\u9009\u62E9\u5668\u3002"
