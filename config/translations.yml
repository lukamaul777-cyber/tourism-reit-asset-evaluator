    title: "\u6587\u65C5 REITs \u8D44\u4EA7\u8BC4\u4F30\u5668"
    subtitle: "\u6587\u65C5\u6D88\u8D39\u57FA\u7840\u8BBE\u65BD REITs \u5E95\u5C42\u8D44\u4EA7\u8BC4\u4F30\u4E0E\u98CE\u9669\u9884\u8B66\u5E73\u53F0"
    methodology_flow: "\u65B9\u6CD5\u6D41\u7A0B"
    flow_gatekeeper_text: "\u5148\u68C0\u67E5\u786C\u6027\u9002\u914D\u6761\u4EF6\u3002"
    flow_scoring_text: "\u57FA\u4E8E\u540C\u4E1A\u6837\u672C\u5F52\u4E00\u5316\u7684 100 \u5206 REITs \u9002\u914D\u6027\u8BC4\u5206\u3002"
